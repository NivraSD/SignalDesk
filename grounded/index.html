<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Grounded</title>
    <script>
      // NUCLEAR: Kill old Workbox service worker before anything else loads
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          var hadSW = regs.length > 0;
          Promise.all(regs.map(function(r) { return r.unregister(); }))
            .then(function() { return caches.keys(); })
            .then(function(names) { return Promise.all(names.map(function(n) { return caches.delete(n); })); })
            .then(function() { if (hadSW) window.location.reload(); });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
